<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComicsChan</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <h1>Multitool</h1>

    <div class="selection-grid">
        <div class="selection-card">
            <a href="/comics">
                <div class="selection-card-image">
                    <img src="/static/images/comic-icon.jpg" alt="Комиксы">
                </div>
                <div class="selection-card-info">
                    <h3>Комиксы</h3>
                    <p>Просмотр и создание комиксов</p>
                </div>
            </a>
        </div>

        <div class="selection-card">
            <a href="/imgur">
                <div class="selection-card-image">
                    <img src="/static/images/imgur-icon.jpg" alt="Imgur">
                </div>
                <div class="selection-card-info">
                    <h3>Imgur</h3>
                    <p>Посмотреть изображения</p>
                </div>
            </a>
        </div>
    </div>

    <div id="content-section">
    </div>
</body>
</html>
